                              // ═══════════════════════════════════════════════════════════════
//  HR RECRUITMENT BACKEND — Google Apps Script
//  Аркуші:
//    • "Employees"        — білий список співробітників
//    • "Працівник офісу"  — заявки офіс (перейменовується з "Заявки")
//    • "Працівник АЗК"    — заявки АЗК (створюється автоматично)
// ═══════════════════════════════════════════════════════════════

function doGet(e) {
  return ContentService
    .createTextOutput("HR Recruitment API is running. Use POST requests.")
    .setMimeType(ContentService.MimeType.TEXT);
}

function doOptions(e) {
  return ContentService.createTextOutput("")
    .setMimeType(ContentService.MimeType.JSON)
    .setHeader("Access-Control-Allow-Origin", "*")
    .setHeader("Access-Control-Allow-Methods", "POST, OPTIONS, GET")
    .setHeader("Access-Control-Allow-Headers", "Content-Type");
}

// ── Допоміжні функції ──────────────────────────────────────────
function jsonResponse(obj) {
  var output = ContentService.createTextOutput(JSON.stringify(obj));
  output.setMimeType(ContentService.MimeType.JSON);
  return output;
}

// ── Аркуш: Працівник офісу ─────────────────────────────────────
// Логіка:
//   1) Якщо є "Працівник офісу" — повертаємо його
//   2) Якщо є "Заявки" — перейменовуємо на "Працівник офісу"
//   3) Інакше — беремо ПЕРШИЙ аркуш таблиці і перейменовуємо його
function getOfficeSheet() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName("Працівник офісу");

  if (!sh) {
    // Пробуємо знайти стару вкладку "Заявки"
    var old = ss.getSheetByName("Заявки");
    if (old) {
      try { old.setName("Працівник офісу"); } catch (e) {}
      sh = ss.getSheetByName("Працівник офісу") || old;
    }
  }

  // Якщо все ще не знайшли — беремо перший аркуш
  if (!sh) {
    var allSheets = ss.getSheets();
    if (allSheets.length > 0) {
      var first = allSheets[0];
      // Перейменовуємо тільки якщо це не "Employees" і не "Працівник АЗК"
      var firstName = first.getName();
      if (firstName !== "Employees" && firstName !== "Працівник АЗК") {
        try { first.setName("Працівник офісу"); } catch (e) {}
        sh = ss.getSheetByName("Працівник офісу") || first;
      }
    }
  }

  // Якщо й досі немає — створюємо новий
  if (!sh) {
    sh = ss.insertSheet("Працівник офісу");
  }

  // Якщо аркуш порожній — додаємо заголовки
  if (sh.getLastRow() === 0) {
    sh.appendRow([
      "orderId","timestamp","request_type","telegram_id",
      "requester_fio","requester_phone","status",
      "department","manager_fio","manager_approved",
      "job_title","vacancies_count","subordinates_count","job_functions",
      "search_reason","priority",
      "salary_probation","salary_after","probation_duration",
      "age_from","age_to","education","specialty",
      "experience","skills","languages","pc_level","programs","traits",
      "contact_fio","contact_phone","contact_email",
      "cancel_reason","stage_office","comment_office"
    ]);
  }
  return sh;
}

// ── Аркуш: Працівник АЗК ───────────────────────────────────────
// Автоматично створюється, якщо його немає
function getAzkSheet() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName("Працівник АЗК");
  if (!sh) {
    sh = ss.insertSheet("Працівник АЗК");
    sh.appendRow([
      "orderId","timestamp","request_type","telegram_id",
      "requester_fio","requester_phone","status",
      "location","manager_fio","manager_approved",
      "job_title","vacancies_count","job_functions",
      "salary","search_reason","priority","probation_duration",
      "contact_fio","contact_phone","contact_email",
      "cancel_reason","stage_office","comment_office"
    ]);
    // Виділяємо заголовки жирним
    sh.getRange(1, 1, 1, 23).setFontWeight("bold");
  }
  return sh;
}

// ── Аркуш: Employees (білий список) ────────────────────────────
function getEmployeeSheet() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName("Employees");
  if (!sh) {
    sh = ss.insertSheet("Employees");
    sh.appendRow(["telegram_id","fio","phone","role","status"]);
  }
  return sh;
}

// ── Генерація ID заявки ────────────────────────────────────────
// OFF-20260531-0142  або  AZK-20260531-0521
function generateOrderId(prefix) {
  var d = new Date();
  var y = d.getFullYear();
  var m = ("0" + (d.getMonth() + 1)).slice(-2);
  var day = ("0" + d.getDate()).slice(-2);
  var rnd = ("0000" + Math.floor(Math.random() * 10000)).slice(-4);
  return (prefix || "HR") + "-" + y + m + day + "-" + rnd;
}

// ── Пошук працівника за Telegram ID ────────────────────────────
function findEmployeeByTelegramId(tid) {
  var sh = getEmployeeSheet();
  var data = sh.getDataRange().getValues();
  var tidStr = String(tid);
  for (var i = 1; i < data.length; i++) {
    if (String(data[i][0]) === tidStr) {
      return {
        row: i + 1,
        telegram_id: data[i][0],
        fio:         data[i][1],
        phone:       data[i][2],
        role:        data[i][3],
        status:      data[i][4] || "active"
      };
    }
  }
  return null;
}

// ── Пошук рядка заявки за orderId у конкретному аркуші ────────
function findOrderRow(sheet, orderId) {
  var data = sheet.getDataRange().getValues();
  for (var i = 1; i < data.length; i++) {
    if (String(data[i][0]) === String(orderId)) {
      return i + 1;
    }
  }
  return -1;
}

// ═══════════════════════════════════════════════════════════════
//  POST dispatcher
// ═══════════════════════════════════════════════════════════════
function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action;

    switch (action) {
      case "check_whitelist":      return handleCheckWhitelist(data);
      case "register_employee":    return handleRegisterEmployee(data);
      case "update_employee":      return handleUpdateEmployee(data);
      case "create_hr_request":    return handleCreateOfficeRequest(data);
      case "create_azk_request":   return handleCreateAzkRequest(data);
      case "get_hr_requests":      return handleGetAllRequests(data);
      case "cancel_hr_request":    return handleCancelRequest(data);
      default:
        return jsonResponse({ status: "error", message: "Unknown action: " + action });
    }
  } catch (err) {
    return jsonResponse({ status: "error", message: String(err) });
  }
}

// ═══════════════════════════════════════════════════════════════
//  check_whitelist
// ═══════════════════════════════════════════════════════════════
function handleCheckWhitelist(data) {
  var tid   = String(data.telegram_id || "");
  var phone = String(data.phone || "").replace(/\D/g, "");

  if (!tid || tid === "BROWSER_TEST_MODE") {
    return jsonResponse({ allowed: false, reason: "no_id" });
  }

  var emp = findEmployeeByTelegramId(tid);
  if (!emp) return jsonResponse({ allowed: false, reason: "not_registered" });
  if (emp.status === "fired") return jsonResponse({ allowed: false, reason: "fired" });

  if (!emp.phone && !phone) return jsonResponse({ allowed: false, reason: "phone_required" });

  var empPhone = String(emp.phone || "").replace(/\D/g, "");
  if (phone && empPhone && phone !== empPhone) {
    return jsonResponse({ allowed: false, reason: "phone_mismatch" });
  }

  return jsonResponse({
    allowed: true,
    fio:   emp.fio,
    phone: emp.phone,
    role:  emp.role
  });
}

// ═══════════════════════════════════════════════════════════════
//  register_employee
// ═══════════════════════════════════════════════════════════════
function handleRegisterEmployee(data) {
  var tid = String(data.telegram_id || "");
  if (!tid || tid === "BROWSER_TEST_MODE") {
    return jsonResponse({ status: "error", message: "Missing telegram_id" });
  }

  var emp = findEmployeeByTelegramId(tid);
  if (emp && emp.status === "fired") {
    return jsonResponse({ status: "error", reason: "fired", message: "Account deactivated" });
  }
  if (emp) {
    return jsonResponse({ status: "success", message: "Already registered" });
  }

  var sh = getEmployeeSheet();
  sh.appendRow([tid, data.fio || "", data.phone || "", data.role || "", "active"]);

  return jsonResponse({
    status: "success",
    message: "Employee registered",
    fio: data.fio, phone: data.phone, role: data.role
  });
}

// ═══════════════════════════════════════════════════════════════
//  update_employee
// ═══════════════════════════════════════════════════════════════
function handleUpdateEmployee(data) {
  var tid = String(data.telegram_id || "");
  var emp = findEmployeeByTelegramId(tid);
  if (!emp) return jsonResponse({ status: "error", message: "Employee not found" });

  var sh = getEmployeeSheet();
  if (data.fio   !== undefined) sh.getRange(emp.row, 2).setValue(data.fio);
  if (data.phone !== undefined) sh.getRange(emp.row, 3).setValue(data.phone);
  if (data.role  !== undefined) sh.getRange(emp.row, 4).setValue(data.role);

  return jsonResponse({ status: "success" });
}

// ═══════════════════════════════════════════════════════════════
//  create_hr_request  →  "Працівник офісу"
// ═══════════════════════════════════════════════════════════════
function handleCreateOfficeRequest(data) {
  var sh = getOfficeSheet();
  var orderId = generateOrderId("OFF");

  sh.appendRow([
    orderId,                         // 1
    timestamp,                       // 2
    "office",                        // 3
    data.telegram_id        || "",   // 4
    data.requester_fio      || "",   // 5
    data.requester_phone    || "",   // 6
    "Нова",                          // 7
    data.department         || "",   // 8
    data.manager_fio        || "",   // 9
    data.manager_approved   || "",   // 10
    data.job_title          || "",   // 11
    data.vacancies_count    || "",   // 12
    data.subordinates_count || "",   // 13
    data.job_functions      || "",   // 14
    data.search_reason      || "",   // 15
    data.priority           || "",   // 16
    data.salary_probation   || "",   // 17
    data.salary_after       || "",   // 18
    data.probation_duration || "",   // 19
    data.age_from           || "",   // 20
    data.age_to             || "",   // 21
    data.education          || "",   // 22
    data.specialty          || "",   // 23
    data.experience         || "",   // 24
    data.skills             || "",   // 25
    data.languages          || "",   // 26
    data.pc_level           || "",   // 27
    data.programs           || "",   // 28
    data.traits             || "",   // 29
    data.contact_fio        || "",   // 30
    data.contact_phone      || "",   // 31
    data.contact_email      || "",   // 32
    "",                              // 33 cancel_reason
    "Очікує розгляду",              // 34 stage_office
    ""                               // 35 comment_office
  ]);

  return jsonResponse({ status: "success", orderId: orderId });
}

// ═══════════════════════════════════════════════════════════════
//  create_azk_request  →  "Працівник АЗК"
// ═══════════════════════════════════════════════════════════════
function handleCreateAzkRequest(data) {
  var sh = getAzkSheet();

  sh.appendRow([

    data.requester_phone    || "",   // 6
    "Нова",                          // 7
    data.location           || "",   // 8  Локація №АЗК
    data.manager_fio        || "",   // 9  Регіональний менеджер
    data.manager_approved   || "",   // 10
    data.job_title          || "",   // 11
    data.vacancies_count    || "",   // 12
    data.job_functions      || "",   // 13
    data.salary             || "",   // 14
    data.search_reason      || "",   // 15
    data.priority           || "",   // 16
    data.probation_duration || "",   // 17
    data.contact_fio        || "",   // 18
    data.contact_phone      || "",   // 19
    data.contact_email      || "",   // 20
    "",                              // 21 cancel_reason
    "Очікує розгляду",              // 22 stage_office
    ""                               // 23 comment_office
  ]);

  return jsonResponse({ status: "success", orderId: orderId });
}

// ═══════════════════════════════════════════════════════════════
//  get_hr_requests  — повертає заявки з обох аркушів
// ═══════════════════════════════════════════════════════════════
function handleGetAllRequests(data) {
  var phone = String(data.phone || "").replace(/\D/g, "");
  if (!phone) return jsonResponse({ status: "success", orders: [], counts: {} });

  var allOrders = [];
  var counts = { all: 0, active: 0, done: 0, cancel: 0, rejected: 0, archive: 0 };

  // ── ОФІС ──
  try {
    var officeOrders = readOfficeRequests(phone);
    officeOrders.forEach(function (o) {
      var g = statusGroup(o.status);
      counts.all++;
      counts[g]++;
      allOrders.push(o);
    });
  } catch (err) {}

  // ── АЗК ──
  try {
    var azkOrders = readAzkRequests(phone);
    azkOrders.forEach(function (o) {
      var g = statusGroup(o.status);
      counts.all++;
      counts[g]++;
      allOrders.push(o);
    });
  } catch (err) {}

  // Сортуємо за orderId (новіші зверху)
  allOrders.sort(function (a, b) {
    return String(b.orderId).localeCompare(String(a.orderId));
  });

  return jsonResponse({ status: "success", orders: allOrders, counts: counts });
}

// Читання офіс-заявок
function readOfficeRequests(phone) {
  var sh = getOfficeSheet();
  var data = sh.getDataRange().getValues();
  if (data.length < 2) return [];
  var headers = data[0];
  var idx = {};
  headers.forEach(function (h, i) { idx[h] = i; });

  var result = [];
  for (var i = 1; i < data.length; i++) {
    var row = data[i];
    var reqPhone = String(row[idx.requester_phone] || "").replace(/\D/g, "");
    if (reqPhone !== phone) continue;

    result.push({
      orderId:          row[idx.orderId],
      date:             row[idx.timestamp],
      requestType:      "office",
      telegram_id:      row[idx.telegram_id],
      requesterFio:     row[idx.requester_fio],
      requesterPhone:   row[idx.requester_phone],
      status:           row[idx.status] || "Нова",
      department:       row[idx.department],
      managerFio:       row[idx.manager_fio],
      managerApproved:  row[idx.manager_approved],
      jobTitle:         row[idx.job_title],
      vacancies:        row[idx.vacancies_count],
      subordinates:     row[idx.subordinates_count],
      jobFunctions:     row[idx.job_functions],
      searchReason:     row[idx.search_reason],
      priority:         row[idx.priority],
      salaryProbation:  row[idx.salary_probation],
      salaryAfter:      row[idx.salary_after],
      probationDuration:row[idx.probation_duration],
      age: (row[idx.age_from] && row[idx.age_to])
            ? ("від " + row[idx.age_from] + " до " + row[idx.age_to] + " років") : "",
      education: (row[idx.education] || "") + (row[idx.specialty] ? " / " + row[idx.specialty] : ""),
      experience:     row[idx.experience],
      skills:         row[idx.skills],
      languages:      row[idx.languages],
      pcLevel:        row[idx.pc_level],
      programs:       row[idx.programs],
      traits:         row[idx.traits],
      contactInfo: [row[idx.contact_fio], row[idx.contact_phone], row[idx.contact_email]]
                      .filter(Boolean).join(" | "),
      stageOffice:    row[idx.stage_office] || "",
      commentOffice:  row[idx.comment_office] || "",
      cancelReason:   row[idx.cancel_reason] || ""
    });
  }
  return result;
}

// Читання АЗК-заявок
function readAzkRequests(phone) {
  var sh = getAzkSheet();
  var data = sh.getDataRange().getValues();
  if (data.length < 2) return [];
  var headers = data[0];

  for (var i = 1; i < data.length; i++) {
    var row = data[i];

    if (reqPhone !== phone) continue;

    result.push({
      orderId:          row[idx.orderId],

      requestType:      "azk",
      telegram_id:      row[idx.telegram_id],
      requesterFio:     row[idx.requester_fio],
      requesterPhone:   row[idx.requester_phone],
      status:           row[idx.status] || "Нова",
      department:       row[idx.location],
      managerFio:       row[idx.manager_fio],
      managerApproved:  row[idx.manager_approved],
      jobTitle:         row[idx.job_title],
      vacancies:        row[idx.vacancies_count],
      subordinates:     "",
      jobFunctions:     row[idx.job_functions],
      searchReason:     row[idx.search_reason],
      priority:         row[idx.priority],
      salaryProbation:  row[idx.salary],
      salaryAfter:      "",
      probationDuration:row[idx.probation_duration],
      age:              "",
      education:        "",
      experience:       "",
      skills:           "",
      languages:        "",
      pcLevel:          "",
      programs:         "",
      traits:           "",
      contactInfo: [row[idx.contact_fio], row[idx.contact_phone], row[idx.contact_email]]
                      .filter(Boolean).join(" | "),

// ═══════════════════════════════════════════════════════════════
//  cancel_hr_request  — шукає заявку в обох аркушах
// ═══════════════════════════════════════════════════════════════
function handleCancelRequest(data) {
  var orderId = String(data.orderId || "");
  var reason  = String(data.cancel_reason || "");
  if (!orderId) return jsonResponse({ status: "error", message: "Missing orderId" });

  // Спочатку шукаємо в офісі
  try {
    var officeSh = getOfficeSheet();
    var officeRow = findOrderRow(officeSh, orderId);
    if (officeRow > 0) {
      var officeHeaders = officeSh.getRange(1, 1, 1, officeSh.getLastColumn()).getValues()[0];
      var statusIdx = officeHeaders.indexOf("status") + 1;
      var reasonIdx = officeHeaders.indexOf("cancel_reason") + 1;
      if (statusIdx > 0) officeSh.getRange(officeRow, statusIdx).setValue("Скасована");
      if (reasonIdx > 0) officeSh.getRange(officeRow, reasonIdx).setValue(reason);
      return jsonResponse({ status: "success", message: "Request cancelled" });
    }
  } catch (e) {}

  // Потім в АЗК
  try {
    var azkSh = getAzkSheet();
    var azkRow = findOrderRow(azkSh, orderId);
    if (azkRow > 0) {
      var azkHeaders = azkSh.getRange(1, 1, 1, azkSh.getLastColumn()).getValues()[0];
      var statusIdx = azkHeaders.indexOf("status") + 1;
      var reasonIdx = azkHeaders.indexOf("cancel_reason") + 1;
      if (statusIdx > 0) azkSh.getRange(azkRow, statusIdx).setValue("Скасована");
      if (reasonIdx > 0) azkSh.getRange(azkRow, reasonIdx).setValue(reason);
      return jsonResponse({ status: "success", message: "Request cancelled" });
    }
  } catch (e) {}

  return jsonResponse({ status: "error", message: "Order not found" });
}

// ── Хелпер: визначення групи статусу ───────────────────────────
function statusGroup(status) {
  var s = String(status || "").toLowerCase();
  if (["нова","в роботі","в обробці","прийнята"].some(function(v){ return s.indexOf(v) !== -1; })) return "active";
  if (["виконан","закрит"].some(function(v){ return s.indexOf(v) !== -1; })) return "done";
  if (s.indexOf("скасован") !== -1) return "cancel";
  if (s.indexOf("відхилен") !== -1) return "rejected";
  if (s.indexOf("архів")    !== -1) return "archive";
  return "active";
}

// ═══════════════════════════════════════════════════════════════
//  СЕРВІСНА ФУНКЦІЯ: Виклич один раз після деплою,
//  щоб гарантовано створити вкладку "Працівник АЗК" і
//  перейменувати стару "Заявки" → "Працівник офісу".
//  Запусти її з редактора Apps Script: Run → initSheets
// ═══════════════════════════════════════════════════════════════
function initSheets() {
  getOfficeSheet();
  getAzkSheet();
  getEmployeeSheet();
  Logger.log("Всі аркуші ініціалізовано ✅");
}
