<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #060a12; color: white; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 35, 0.45); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; }
    </style>
</head>
<body class="p-6">
    <div id="page-loading" class="text-center pt-20">Завантаження...</div>
    
    <div id="page-register" class="hidden glass mt-10">
        <h2 class="text-xl font-bold mb-4">Реєстрація доступу</h2>
        <input type="text" id="reg-fio" placeholder="Ваше ПІБ" class="w-full p-3 mb-3 bg-black/50 border border-white/10 rounded-lg">
        <input type="tel" id="reg-phone" placeholder="Ваш телефон" class="w-full p-3 mb-4 bg-black/50 border border-white/10 rounded-lg">
        <button onclick="doRegister()" class="w-full p-3 bg-pink-600 rounded-lg font-bold">Надіслати запит</button>
    </div>

    <div id="page-blocked" class="hidden text-center pt-20 text-red-400 font-bold">Доступ заборонено</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const TELEGRAM_ID = tg.initDataUnsafe.user.id;
        const WEBHOOK_URL = "ВАШ_URL_APPS_SCRIPT_БІЛОГО_СПИСКУ";

        // Перевірка статусу при вході
        fetch(WEBHOOK_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "check_access", telegram_id: TELEGRAM_ID }),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('page-loading').classList.add('hidden');
            if (data.user_status === 'Активний') {
                // Тут логіка відкриття форми HR
            } else if (data.user_status === 'not_found') {
                document.getElementById('page-register').classList.remove('hidden');
            } else {
                document.getElementById('page-blocked').classList.remove('hidden');
            }
        });

        function doRegister() {
            const fio = document.getElementById('reg-fio').value;
            const phone = document.getElementById('reg-phone').value;
            fetch(WEBHOOK_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "register_user", telegram_id: TELEGRAM_ID, fio: fio, phone: phone }),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            }).then(() => alert("Запит надіслано! Очікуйте схвалення."));
        }
    </script>
</body>
</html>
